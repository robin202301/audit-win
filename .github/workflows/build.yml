name: Build and Release Windows App

on:
  push:
    branches: [main, master]
    tags:
      - 'v*' # 当你推送 v0.1.0 这种标签时触发 Release
  pull_request:
    branches: [main, master]

# 核心：解决 403 Forbidden 权限问题
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        # 使用 ci 确保环境一致性，如果是常规开发用 install 也可以
        run: npm install

      - name: 重建原生模块 (针对 C++ 扩展)
        run: npx electron-rebuild

      - name: 前端打包 (Vite/Webpack)
        run: npm run build

      - name: 打包 Windows 安装程序
        # 使用 --publish never 确保在此步骤不触发发布，由下方的 release job 统一处理
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 调试：列出文件确保路径正确
        # 如果还是找不到文件，这个步骤会在日志里告诉你文件到底在哪
        run: |
          Get-ChildItem -Path . -Recurse -Filter "*.exe"
          Get-ChildItem -Path . -Recurse -Filter "*.yml"

      - name: 上传构建产物至 Action Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KQQ-Audit-System-Windows
          # 使用通配符兼容 dist 和 release 目录
          path: |
            **/dist/*.exe
            **/dist/*.yml
            **/release/*.exe
            **/release/*.yml
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build-windows
    # 只有推送 tag 时才执行真正的发布操作
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: KQQ-Audit-System-Windows
          path: artifacts/

      - name: 发布至 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 自动匹配下载到的所有 exe 和 yml 文件
          files: |
            artifacts/**/*.exe
            artifacts/**/*.yml
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}